name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: mac-arm64
            os: macos-latest
            builder_args: --mac --arm64
          - name: mac-x64
            os: macos-latest
            builder_args: --mac --x64
          - name: linux-x64
            os: ubuntu-latest
            builder_args: --linux --x64
          - name: windows-x64
            os: windows-latest
            builder_args: --win --x64
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build:web
      - run: npx electron-builder ${{ matrix.builder_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: blockopoly-${{ matrix.name }}
          path: |
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.AppImage
            frontend/release/Blockopoly-*-win-x64.exe
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            frontend/release/*.dmg
            frontend/release/*.zip
            frontend/release/*.AppImage
            frontend/release/Blockopoly-*-win-x64.exe
