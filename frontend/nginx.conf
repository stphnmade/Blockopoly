server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location ~ ^/assets/index-.*\.js$ {
    try_files $uri /assets/index-legacy.js =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~ ^/assets/index-.*\.css$ {
    try_files $uri /assets/index-legacy.css =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /asset-cache-sw.js {
    try_files $uri =404;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location / {
    try_files $uri $uri/ /index.html;
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
