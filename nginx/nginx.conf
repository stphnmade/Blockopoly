events {}

http {
  keepalive_timeout 65;

  server {
    listen 80;
    server_name playblockopoly.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name playblockopoly.com;

    ssl_certificate /etc/letsencrypt/live/playblockopoly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playblockopoly.com/privkey.pem;

    location / {
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/room/ {
      proxy_pass http://room-service:8080/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      proxy_set_header Connection '';
      add_header X-Accel-Buffering no;
      proxy_read_timeout 3600;
    }

    location /api/game/ {
      proxy_pass http://game-service:8081/;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding off;
      add_header X-Accel-Buffering no;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}